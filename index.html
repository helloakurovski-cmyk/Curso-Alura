<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        /* Estilo do Cabeçalho */
        header {
            background-color: #183C63;
            color: #FFFFFF;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Estilo do Conteúdo Principal */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Organização de cada Post (Artigo) */
        article {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 20px;
        }

        /* Estilo da Imagem */
        img {
            width: 80px;
            height: 80px;
        }

        /* Estilo do texto do autor */
        .artigo-autor {
            font-style: italic;
            color: #555;
        }

        /* Estilo dos botões */
        button {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 5px 10px;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>

    <main>
        <article>
            <img src="imagem-blog.png" alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">
            <div>
                <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por: Marcelo Paludetto</p>
                <p>Boas-vienas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>
                <button class="btn-reacao">❤️ <span>0</span></button>
                <button class="btn-reacao">👍 <span>0</span></button>
            </div>
        </article>
